# =============================================================================
# TG-Ticket-Agent Docker Compose - Production
# =============================================================================
# This is the main docker-compose.yml for Dokploy deployment
# Separate services for API (uvicorn) and Telegram bot (aiogram)
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Main Application Service (Bot + API)
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Database Migrations (one-shot service)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "backend/run_migrations.py"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tg-ticket-network
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # NOTE: container_name removed to allow dev/prod to run side-by-side
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - PORT=${PORT:-3001}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - BILL24_TEST_URL=${BILL24_TEST_URL:-https://api.bil24.pro:8443/json}
      - BILL24_REAL_URL=${BILL24_REAL_URL:-https://api.bil24.pro/json}
      - BILL24_DEFAULT_ZONE=${BILL24_DEFAULT_ZONE:-test}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_EXPIRES_IN=${ADMIN_JWT_EXPIRES_IN:-24h}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - ENV=${ENV:-production}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tg-ticket-network

  # ---------------------------------------------------------------------------
  # Telegram Bot (aiogram polling/webhook)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "backend.app.bot.runner"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - BILL24_TEST_URL=${BILL24_TEST_URL:-https://api.bil24.pro:8443/json}
      - BILL24_REAL_URL=${BILL24_REAL_URL:-https://api.bil24.pro/json}
      - BILL24_DEFAULT_ZONE=${BILL24_DEFAULT_ZONE:-test}
      - ENV=${ENV:-production}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - tg-ticket-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    # NOTE: container_name removed to allow dev/prod to run side-by-side
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-tg_ticket_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tg_ticket_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg-ticket-network

  # ---------------------------------------------------------------------------
  # Redis Cache/Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    # NOTE: container_name removed to allow dev/prod to run side-by-side
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg-ticket-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tg-ticket-network:
    driver: bridge
