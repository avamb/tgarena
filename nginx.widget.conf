# =============================================================================
# TG-Ticket-Agent Widget Nginx Configuration
# =============================================================================
# Configuration for serving the modified Bill24 widget
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.php;

    # Security headers
    add_header X-Frame-Options "ALLOWALL" always;  # Allow embedding in Telegram WebApp
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers for Telegram WebApp
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP files (if widget has PHP components)
    location ~ \.php$ {
        # Note: In production, PHP files should be pre-rendered or
        # handled by a PHP-FPM container
        try_files $uri =404;
        # Uncomment below if PHP-FPM is available:
        # fastcgi_pass php:9000;
        # fastcgi_index index.php;
        # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # include fastcgi_params;
    }

    # Error handling
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
