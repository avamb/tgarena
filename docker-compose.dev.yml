# =============================================================================
# TG-Ticket-Agent Docker Compose - Development
# =============================================================================
# Development environment with hot-reload and all services
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Backend API (FastAPI with hot-reload)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: tg-ticket-agent-api-dev
    volumes:
      - ./backend:/app/backend
      - ./bot:/app/bot
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tg_ticket_agent
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - BILL24_TEST_URL=${BILL24_TEST_URL:-https://api.tixgear.com:1240/json}
      - BILL24_REAL_URL=${BILL24_REAL_URL:-https://api.tixgear.com/json}
      - BILL24_DEFAULT_ZONE=${BILL24_DEFAULT_ZONE:-test}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-dev-secret-change-me}
      - ADMIN_JWT_EXPIRES_IN=24h
      - DEBUG=true
      - ENV=development
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tg-ticket-network-dev

  # ---------------------------------------------------------------------------
  # Telegram Bot (aiogram with polling)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: tg-ticket-agent-bot-dev
    volumes:
      - ./backend:/app/backend
      - ./bot:/app/bot
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tg_ticket_agent
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BILL24_TEST_URL=${BILL24_TEST_URL:-https://api.tixgear.com:1240/json}
      - BILL24_REAL_URL=${BILL24_REAL_URL:-https://api.tixgear.com/json}
      - BILL24_DEFAULT_ZONE=${BILL24_DEFAULT_ZONE:-test}
      - DEBUG=true
      - ENV=development
    command: python -m bot.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tg-ticket-network-dev

  # ---------------------------------------------------------------------------
  # Admin Panel (React with Vite dev server)
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      target: builder
    container_name: tg-ticket-agent-admin-dev
    volumes:
      - ./admin:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    networks:
      - tg-ticket-network-dev

  # ---------------------------------------------------------------------------
  # Widget (nginx serving static files)
  # ---------------------------------------------------------------------------
  widget:
    build:
      context: .
      dockerfile: Dockerfile.widget
    container_name: tg-ticket-agent-widget-dev
    volumes:
      - ./widget:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - tg-ticket-network-dev

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: tg-ticket-agent-postgres-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tg_ticket_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_ticket_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg-ticket-network-dev

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tg-ticket-agent-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg-ticket-network-dev

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  tg-ticket-network-dev:
    driver: bridge
