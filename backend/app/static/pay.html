<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
        }
        #checkout { min-height: 300px; }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .loading .spinner::after {
            content: ''; display: inline-block; width: 32px; height: 32px;
            border: 3px solid var(--tg-theme-hint-color, #ccc);
            border-top-color: var(--tg-theme-button-color, #007aff);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { margin-top: 16px; font-size: 14px; opacity: 0.6; }
        .success {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        .success .check { font-size: 48px; margin-bottom: 16px; }
        .success h2 { margin-bottom: 8px; }
        .success p { opacity: 0.6; font-size: 14px; }
        .error { color: #df1b41; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading payment form...</p>
    </div>
    <div id="checkout"></div>
    <div id="success" class="success" style="display:none;">
        <div class="check">✅</div>
        <h2>Payment Confirmed!</h2>
        <p>Your tickets will be sent to the chat.</p>
    </div>
    <div id="error" class="error" style="display:none;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');
        const apiBase = window.location.origin;

        // Check if returning from payment completion
        const sessionId = params.get('session_id');
        if (sessionId) {
            handleReturn();
        } else {
            initCheckout();
        }

        async function initCheckout() {
            try {
                const res = await fetch(`${apiBase}/api/payments/create-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: parseInt(orderId) }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to create payment');
                }

                const data = await res.json();

                // Initialize Stripe Embedded Checkout Page
                const stripe = Stripe(data.publishable_key);
                const checkout = await stripe.createEmbeddedCheckoutPage({
                    fetchClientSecret: async () => data.client_secret,
                });

                // Hide loading, mount checkout
                document.getElementById('loading').style.display = 'none';
                checkout.mount('#checkout');

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = err.message;
            }
        }

        async function handleReturn() {
            document.getElementById('loading').querySelector('p').textContent = 'Verifying payment...';
            try {
                const res = await fetch(`${apiBase}/api/payments/verify?session_id=${sessionId}&order_id=${orderId}`);
                const data = await res.json();

                if (data.status === 'paid' || data.status === 'already_paid') {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('success').style.display = 'flex';
                    setTimeout(() => tg.close(), 2000);
                } else {
                    document.getElementById('loading').querySelector('p').textContent =
                        'Payment not completed. Please try again.';
                }
            } catch (err) {
                document.getElementById('loading').querySelector('p').textContent = err.message;
            }
        }
    </script>
</body>
</html>
