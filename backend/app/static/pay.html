<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner::after {
            content: ''; display: inline-block; width: 32px; height: 32px;
            border: 3px solid var(--tg-theme-hint-color, #ccc);
            border-top-color: var(--tg-theme-button-color, #007aff);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { margin-top: 16px; font-size: 14px; opacity: 0.6; }
        .error { color: #df1b41; opacity: 1; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p id="status">Redirecting to payment...</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');
        const apiBase = window.location.origin;

        async function init() {
            try {
                const res = await fetch(`${apiBase}/api/payments/create-intent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: parseInt(orderId) }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to create payment');
                }

                const data = await res.json();

                // Redirect to Stripe Checkout
                window.location.href = data.checkout_url;

            } catch (err) {
                document.getElementById('status').textContent = err.message;
                document.getElementById('status').className = 'error';
            }
        }

        init();
    </script>
</body>
</html>
